# ===========================================
# Traefik Dynamic Configuration - Shared Middlewares
# ===========================================
# Routers & Services đã chuyển sang Docker labels
# trong từng docker-compose.yml của mỗi service

http:
  # =========================================
  # MIDDLEWARES
  # =========================================
  middlewares:
    # HTTPS Redirect
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true


    # Security Headers (HSTS, etc.)
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "SAMEORIGIN"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"

    # Gzip Compression
    gzip:
      compress: true

    # Static Assets Cache Headers (Images, CSS, JS)
    static-cache-headers:
      headers:
        # Cache static assets for 1 year (immutable assets with hash)
        customResponseHeaders:
          Cache-Control: "public, max-age=31536000, immutable"
          Vary: "Accept-Encoding"
        # Security headers for static assets
        contentTypeNosniff: true
        browserXssFilter: true

    # Block Database Manager
    block-database:
      replacePath:
        path: "/web/login"

    # Rate Limiting (for API)
    rate-limit:
      rateLimit:
        average: 30
        burst: 50