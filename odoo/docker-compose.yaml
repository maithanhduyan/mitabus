services:

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo
    expose:
      - "8069"
      - "8072"
    volumes:
      - ./data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./log:/var/log/odoo
      - ./scripts:/mnt/scripts:ro
    env_file:
      - ./.env
    networks:
      - mitabus-net
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    ports:
      - "8069:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - odoo
    networks:
      - mitabus-net
    restart: always


networks:
  mitabus-net:
    external: true
