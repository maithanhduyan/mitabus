worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # --- Buffering (absorb slow clients) ---
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 64k;
    proxy_busy_buffers_size 128k;
    proxy_temp_file_write_size 128k;

    # --- Odoo 19 Upstreams ---
    upstream odoo-web {
        server odoo:8069;
        keepalive 32;
    }

    upstream odoo-websocket {
        server odoo:8072;
        keepalive 16;
    }

    # --- MinIO Upstream ---
    upstream minio-backend {
        server minio:9000;
        keepalive 16;
    }

    # --- Map for WebSocket upgrade ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- Rate Limiting Zones ---
    limit_req_zone $binary_remote_addr zone=general:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # --- Connection Limit ---
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # --- Nginx Cache Zone (images, static, MinIO media) ---
    proxy_cache_path /var/cache/nginx/odoo levels=1:2
                     keys_zone=odoo_cache:20m max_size=2g
                     inactive=30d use_temp_path=off;

    server {
        listen 80;
        server_name _;

        # --- Security headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;

        # --- Connection limits ---
        limit_conn perip 100;

        # --- Buffer overflow protection ---
        client_max_body_size 200m;
        client_body_buffer_size 16k;
        client_header_buffer_size 1k;
        large_client_header_buffers 4 8k;

        # --- Restrict HTTP methods ---
        if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$) {
            return 444;
        }

        # --- Proxy headers ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # --- Timeouts ---
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_read_timeout 720s;

        # --- Block sensitive paths & scanners ---
        location ~* /(\.|wp-admin|wp-login|phpmyadmin|myadmin|phpinfo|actuator|cgi-bin|\.(git|svn|env|bak|sql|log)) {
            access_log off;
            log_not_found off;
            return 444;
        }

        # --- Block MinIO config files (security) ---
        location /s3-media/configs/ {
            return 403;
        }

        # --- Direct MinIO media serving (bypasses Odoo Python) ---
        location /s3-media/ {
            rewrite ^/s3-media/(.*) /odoo/$1 break;
            proxy_pass http://minio-backend;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-meta-server-side-encryption;
            proxy_hide_header x-amz-server-side-encryption;
            proxy_hide_header Set-Cookie;
            proxy_ignore_headers Set-Cookie;

            proxy_cache odoo_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=2592000, immutable";
            expires 30d;
        }

        # --- Odoo image endpoints with nginx caching ---
        location ~* ^/web/image/ {
            proxy_pass http://odoo-web;
            proxy_redirect off;
            proxy_cache odoo_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 301 302 1h;
            proxy_cache_valid 404 1m;
            proxy_cache_key $scheme$proxy_host$request_uri;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=604800";
            expires 7d;
        }

        # --- Static content with cache ---
        location ~* ^/web/content/ {
            proxy_pass http://odoo-web;
            proxy_redirect off;
            proxy_cache odoo_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_key $scheme$proxy_host$request_uri;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=604800";
            expires 7d;
        }

        # --- Static assets (JS/CSS/fonts) with aggressive cache ---
        location ~* ^/web/static/ {
            proxy_pass http://odoo-web;
            proxy_cache odoo_cache;
            proxy_cache_valid 200 60d;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=5184000, immutable";
            expires 60d;
        }

        # --- WebSocket (Odoo 19 uses /websocket) ---
        location /websocket {
            proxy_pass http://odoo-websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # --- Block Odoo database manager in production ---
        location ~* ^/web/database/ {
            deny all;
            return 403;
        }

        # --- Rate-limit login ---
        location = /web/login {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://odoo-web;
            proxy_redirect off;
        }

        location = /web/session/authenticate {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://odoo-web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
        }

        # --- JSON-RPC rate limiting ---
        location = /jsonrpc {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://odoo-web;
            proxy_redirect off;
        }

        location = /xmlrpc/2/object {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://odoo-web;
            proxy_redirect off;
        }

        # --- Health check for Traefik ---
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # --- All other requests → Odoo HTTP workers ---
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://odoo-web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
        }
    }
}
