[options]
; --- Database ---
; db_host set via Docker env var HOST=postgres-18 (separate PG18 instance)
; db_port, db_user, db_password set via Docker env vars
db_maxconn = 16
db_template = template0

; --- Single database mode ---
dbfilter = False

; --- Paths ---
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; --- Server ---
proxy_mode = True
http_interface = 0.0.0.0
http_port = 8069
gevent_port = 8072

; --- Workers (4 CPU / 4 GB RAM) ---
; Formula: (2 * CPU) + 1 = 9, but RAM-limited → 2 HTTP + 1 cron + 1 gevent
workers = 2
max_cron_threads = 1

; --- Resource Limits (per worker) ---
limit_time_cpu = 600
limit_time_real = 1200
limit_memory_soft = 681574400
limit_memory_hard = 805306368
limit_request = 8192

; --- Security ---
list_db = False
admin_passwd = False
server_wide_modules = base,web

; --- Logging ---
log_level = info
log_handler = :INFO
logfile = /var/log/odoo/odoo-server.log
; log_db = True

; --- Performance ---
transient_age_limit = 1.0

; --- SMTP (configure per tenant or system-wide) ---
; smtp_server = smtp.gmail.com
; smtp_port = 587
; smtp_ssl = True
; smtp_user = noreply@tayafood.com
; smtp_password = xxx

; --- Custom ---
unaccent = True
